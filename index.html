<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카공 지도 프로젝트</title>
    <style>
        /* CSS: 화면을 왼쪽(목록)과 오른쪽(지도)으로 나눕니다 */
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
        #sidebar { width: 300px; padding: 20px; background: #f8f9fa; overflow-y: auto; border-right: 1px solid #ddd; }
        #map { flex: 1; }
        .search-box { margin-bottom: 20px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>카페 검색</h2>
        <div class="search-box">
            <input type="text" placeholder="장소를 검색하세요 (예: 저가 커피)">
        </div>
        <ul id="placesList">
            <li>검색 결과가 여기에 표시됩니다.</li>
        </ul>
    </div>
    <div id="map"></div>

    <!-- 카카오 API 로드: [선생님 JS 키] 부분을 실제 키로 바꾸세요 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=[선생님 JS 키]&libraries=services"></script>
    <script>
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 거부 시 기본 좌표 (서울시청)
            level: 5 // 지도 확대 레벨
        };

        const map = new kakao.maps.Map(container, options);

        // 현재 위치 가져오기
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const locPosition = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(locPosition); // 지도를 현재 위치로 이동
                new kakao.maps.Marker({ map: map, position: locPosition }); // 내 위치 마커
            });
        }
    </script>
</body>
</html>
